name: Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: '30.2'

      - name: Cache Eldev dependencies
        uses: actions/cache@v4
        with:
          path: ~/.emacs.d/eldev
          key: ${{ runner.os }}-eldev-coverage-v3-${{ hashFiles('Eldev') }}
          restore-keys: |
            ${{ runner.os }}-eldev-coverage-v3-

      - name: Install Eldev
        run: curl --fail --silent --show-error --location https://raw.github.com/doublep/eldev/master/webinstall/github-eldev | sh

      - name: Install Beads v0.58.0
        run: |
          curl -fsSL https://github.com/steveyegge/beads/releases/download/v0.58.0/beads_0.58.0_linux_amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin bd

      - name: Verify Beads installation
        run: bd version

      - name: Install Dolt
        run: sudo bash -c 'curl -L https://github.com/dolthub/dolt/releases/latest/download/install.sh | bash'

      - name: Verify Dolt installation
        run: dolt version

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Create coverage directory
        run: mkdir -p coverage

      - name: Run tests with coverage
        # Use source loading mode (-s) instead of packaged mode (-p) because
        # undercover cannot instrument byte-compiled files.
        # The Eldev file configures codecov format via eldev-undercover-config.
        # EMACS_TEST_JUNIT_REPORT generates JUnit XML for Codecov Test Analytics.
        # Use absolute path for JUnit report since Eldev changes cwd during tests.
        run: CI=true EMACS_TEST_JUNIT_REPORT=${{ github.workspace }}/coverage/junit.xml eldev -s -dtT test -U coverage/codecov.json

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/codecov.json
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          files: coverage/junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}
