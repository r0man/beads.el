name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '29.4'
          - '30.2'
          - 'snapshot'

    # Emacs 29.4 has a known EIEIO byte-compilation bug that causes
    # invalid-function errors for cross-file defun references in
    # cl-defmethod dispatch.  Allow 29.4 to fail without blocking CI.
    continue-on-error: ${{ matrix.emacs_version == '29.4' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Emacs ${{ matrix.emacs_version }}
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Cache Eldev dependencies
        uses: actions/cache@v4
        with:
          path: ~/.emacs.d/eldev
          key: ${{ runner.os }}-eldev-test-v4-${{ matrix.emacs_version }}-${{ hashFiles('Eldev') }}
          restore-keys: |
            ${{ runner.os }}-eldev-test-v4-${{ matrix.emacs_version }}-

      - name: Install Eldev
        run: curl --fail --silent --show-error --location https://raw.github.com/doublep/eldev/master/webinstall/github-eldev | sh

      - name: Install Beads v0.58.0
        run: |
          curl -fsSL https://github.com/steveyegge/beads/releases/download/v0.58.0/beads_0.58.0_linux_amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin bd

      - name: Verify Beads installation
        run: bd version

      - name: Install Dolt
        run: sudo bash -c 'curl -L https://github.com/dolthub/dolt/releases/latest/download/install.sh | bash'

      - name: Verify Dolt installation
        run: dolt version

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Run tests
        run: eldev -p -dtT test
